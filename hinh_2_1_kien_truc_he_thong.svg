<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" font-family="Times New Roman, Times, serif">

  <!-- Background -->
  <rect width="960" height="600" fill="#ffffff" stroke="#000000" stroke-width="2"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#000000">Hình 2.1: Sơ đồ kiến trúc hệ thống tổng thể</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" font-style="italic" fill="#000000">Hệ thống Tìm Trọ 24/7 — Android App · Firebase Platform · Web Admin Panel</text>

  <!-- LEFT: Android App (Client) -->
  <rect x="30" y="110" width="180" height="310" rx="8" fill="#ffffff" stroke="#000000" stroke-width="2"/>
  <rect x="30" y="110" width="180" height="36" rx="8" fill="#000000"/>
  <rect x="30" y="134" width="180" height="12" fill="#000000"/>
  <text x="120" y="133" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Android App (Client)</text>
  <text x="120" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#000000">Kotlin · MVVM</text>

  <rect x="45" y="182" width="150" height="28" rx="4" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="120" y="200" text-anchor="middle" font-size="10" fill="#000000">View (Activity/Fragment)</text>

  <rect x="45" y="220" width="150" height="28" rx="4" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="120" y="238" text-anchor="middle" font-size="10" fill="#000000">ViewModel + LiveData</text>

  <rect x="45" y="258" width="150" height="28" rx="4" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="120" y="276" text-anchor="middle" font-size="10" fill="#000000">Repository Layer</text>

  <rect x="45" y="296" width="150" height="28" rx="4" fill="#ffffff" stroke="#000000" stroke-width="1.2"/>
  <text x="120" y="314" text-anchor="middle" font-size="10" fill="#000000">Firebase SDK</text>

  <line x1="120" y1="334" x2="120" y2="340" stroke="#000000" stroke-width="1"/>
  <text x="120" y="356" text-anchor="middle" font-size="10" font-weight="bold" fill="#000000">Người dùng · Người đăng tin</text>
  <text x="120" y="372" text-anchor="middle" font-size="10" fill="#000000">Android 8.0+ (API 26)</text>
  <text x="120" y="394" text-anchor="middle" font-size="10" font-style="italic" fill="#000000">[ Client di động ]</text>

  <!-- CENTER: Firebase Platform (BaaS) -->
  <rect x="278" y="76" width="404" height="444" rx="10" fill="#ffffff" stroke="#000000" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="278" y="76" width="404" height="36" rx="10" fill="#000000"/>
  <rect x="278" y="100" width="404" height="12" fill="#000000"/>
  <text x="480" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Firebase Platform (BaaS)</text>

  <!-- Firebase Auth -->
  <rect x="296" y="126" width="168" height="54" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="380" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Firebase Auth</text>
  <text x="380" y="165" text-anchor="middle" font-size="10" fill="#000000">Email · Google · Token JWT</text>

  <!-- Firestore -->
  <rect x="474" y="126" width="190" height="54" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="569" y="148" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Cloud Firestore</text>
  <text x="569" y="165" text-anchor="middle" font-size="10" fill="#000000">NoSQL · Real-time · 8 collections</text>

  <!-- Storage -->
  <rect x="296" y="192" width="168" height="54" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="380" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Firebase Storage</text>
  <text x="380" y="231" text-anchor="middle" font-size="10" fill="#000000">Ảnh phòng · CCCD · Avatar</text>

  <!-- FCM -->
  <rect x="474" y="192" width="190" height="54" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text x="569" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#000000">Firebase FCM</text>
  <text x="569" y="231" text-anchor="middle" font-size="10" fill="#000000">Thông báo đẩy di động</text>

